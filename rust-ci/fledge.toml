[tasks]
fmt = "cargo fmt --check"
lint = "cargo clippy -- -D warnings"
test = "cargo test"

[tasks.build]
cmd = "cargo build --release"
deps = ["lint"]
env = { RUST_LOG = "info" }

[lanes.ci]
steps = ["fmt", "lint", "test", "build"]
fail_fast = true

[lanes.check]
steps = [{ parallel = ["fmt", "lint"] }, "test"]

[lanes.full]
steps = [{ parallel = ["fmt", "lint"] }, "test", "build"]
fail_fast = true
